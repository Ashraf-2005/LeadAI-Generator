<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeadAI - Login</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body id="login">
  <div class="auth-container">
    <div class="auth-card">
      <h1>LeadAI</h1>
      <p>AI-Powered Sales Lead Qualification</p>

      <div id="alertContainer"></div>

      <div id="loginForm">
        <h2 style="font-size: 1.25rem; margin-bottom: 1rem;">Sign In</h2>
        <form onsubmit="handleLogin(event)">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign In</button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem;">
          Don't have an account? <a href="#" class="auth-link" onclick="toggleForms(event)">Register here</a>
        </p>
      </div>

      <div id="registerForm" style="display: none;">
        <h2 style="font-size: 1.25rem; margin-bottom: 1rem;">Create Account</h2>
        <form onsubmit="handleRegister(event)">
          <div class="form-group">
            <label for="regUsername">Username</label>
            <input type="text" id="regUsername" required>
          </div>
          <div class="form-group">
            <label for="regPassword">Password</label>
            <input type="password" id="regPassword" required>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Create Account</button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem;">
          Already have an account? <a href="#" class="auth-link" onclick="toggleForms(event)">Sign in here</a>
        </p>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
  <script>
    function toggleForms(event) {
      event.preventDefault();
      document.getElementById("loginForm").style.display = document.getElementById("loginForm").style.display === "none" ? "block" : "none";
      document.getElementById("registerForm").style.display = document.getElementById("registerForm").style.display === "none" ? "block" : "none";
    }

    async function handleLogin(event) {
      event.preventDefault();
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      try {
        await loginUser(username, password);
        window.location.href = "/dashboard.html";
      } catch (error) {
        showAlert(error.message, "error");
      }
    }

    async function handleRegister(event) {
      event.preventDefault();
      const username = document.getElementById("regUsername").value;
      const password = document.getElementById("regPassword").value;

      try {
        await registerUser(username, password);
        window.location.href = "/dashboard.html";
      } catch (error) {
        showAlert(error.message, "error");
      }
    }

    // Redirect to dashboard if already logged in
    if (localStorage.getItem("access_token")) {
      window.location.href = "/dashboard.html";
    }
  </script>
</body>
</html>
